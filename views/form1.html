<html>
    <head>
        <title>Biblioteca</title>
        <meta charset="UTF-8">
        <script language="javascript">
          function validarInformacoes(){
            var nome = document.getElementById('nome').value;
            var sobrenome = document.getElementById('sobrenome').value;

            if (nome == '') {
              alert('O campo Nome é obrigatório.');
              return false;
            } else if (nome == ' '){
              alert('O campo Nome é obrigatório.');
              return false;
            }

            if (sobrenome == '') {
              alert('O campo Sobrenome é obrigatório.');
              return false;
            } else if (sobrenome == ' ') {
              alert('O campo Sobrenome é obrigatório.');
              return false;
            }

            return true;
          }
        </script>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
        <style>
          .nav justify-content-center{
              height: 50%;
          }
        </style>
    </head>
    <body>
        <div class="jumbotron text-center" style="margin-bottom:0">
            <h1>Cadastro de Usuários</h1>
        </div>
    
        <nav class="navbar navbar-expand-sm bg-dark navbar-dark" style="margin-bottom:20">
            <div class="collapse navbar-collapse justify-content-center" id="collapsibleNavbar">
                <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:8000/1">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:8000/3">Livros</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:8000/2">Tipos de usuários</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="http://localhost:8000/4">Categorias dos livros</a>
                </li>
                </ul>
            </div>
        </nav>

        <form action="salvar1" method="post" onsubmit="return validarInformacoes()">
            <div class="container">
                <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" required="required" class="form-control" name="nome" id="nome">
                </div>
                
                <div class="form-group">
                <label for="sobrenome">Sobrenome:</label>
                <input type="text" required="required" class="form-control" name="sobrenome" id="sobrenome">
                </div>

                <div class="form-group">
                <label for="endereco">Endereço:</label>
                <input type="text" class="form-control" required="required" name="endereco" id="endereco">
                </div>

                <div class="form-group">
                <label for="cidade">Cidade:</label>
                <input type="text" class="form-control" required="required" name="cidade" id="cidade">
                </div>

                <div class="form-group">
                <label for="sigla_estado">Estado:</label>
                <select name="sigla_estado" class="form-control" required="required id="sigla_estado">
                    <option value="">Selecione seu Estado:</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espirito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                </select>
                </div>
                
                <div class="form-group">
                    <label for="telefone">Telefone: EX: (11) 91111-1111</label>
                    <input type="text" pattern="(\([0-9]{2}\))\s([9]{1})?([0-9]{4})-([0-9]{4})" required="required" class="form-control" name="telefone" id="telefone">
                </div>

                <div class="form-group">
                    <label for="tipo_usuario_id">Id do tipo de usuário:</label>
                    <input type="number" required="required" class="form-control" name="tipo_usuario_id" id="tipo_usuario_id">
                </div>
            </div>

            <div class="jumbotron text-center" style="margin-bottom:0">
                <input type="submit" class="btn btn-outline-primary" id="save" role="button" value="Salvar">
                <input type="reset" class="btn btn-outline-primary" id="limp" role="button" value="Limpar">
            </div>
        </form>
    </body>
</html>
